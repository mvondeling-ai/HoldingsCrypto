<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Holdings">
<title>Holdings — Crypto Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #07090c;
    --bg-elevated: #0e1217;
    --bg-card: #11161d;
    --line: #1d242e;
    --line-soft: #161b22;
    --ink: #eef1f5;
    --ink-dim: #8b97a8;
    --ink-faint: #4d5867;
    --accent: #d9ff4b;
    --accent-dim: #8a9a3a;
    --up: #4ade80;
    --down: #ff6b5e;
    --radius: 18px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{
    margin:0; padding:0; background:var(--bg); color:var(--ink);
    font-family:'Space Grotesk', system-ui, sans-serif;
    overscroll-behavior-y: none;
    width:100%; min-height:100vh;
  }
  .mono{ font-family:'JetBrains Mono', monospace; }
  #root{ max-width:560px; margin:0 auto; min-height:100vh; position:relative; padding-bottom:40px; }

  /* ambient gradient */
  .glow{
    position:fixed; top:-200px; left:50%; transform:translateX(-50%);
    width:700px; height:500px; pointer-events:none; z-index:0;
    background: radial-gradient(ellipse at center, rgba(217,255,75,0.07), transparent 70%);
  }

  header{
    padding:22px 20px 6px; position:relative; z-index:1;
    display:flex; align-items:flex-start; justify-content:space-between;
  }
  .brand-eyebrow{
    font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:0.14em;
    color:var(--ink-faint); text-transform:uppercase; margin:0 0 4px;
  }
  .brand-title{ font-size:22px; font-weight:700; margin:0; letter-spacing:-0.01em; }
  .refresh-btn{
    width:38px; height:38px; border-radius:50%; border:1px solid var(--line);
    background:var(--bg-card); color:var(--ink-dim); display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition: transform .5s cubic-bezier(.2,.9,.3,1), color .2s, border-color .2s;
  }
  .refresh-btn:active{ transform: rotate(180deg); color:var(--accent); border-color:var(--accent-dim); }
  .refresh-btn.spinning svg{ animation: spin .9s linear infinite; }
  @keyframes spin{ to{ transform: rotate(360deg);} }

  /* Hero total value */
  .hero{
    padding:18px 20px 22px; position:relative; z-index:1;
  }
  .hero-label{
    font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--ink-faint);
    text-transform:uppercase; letter-spacing:0.12em; margin-bottom:10px;
  }
  .hero-value{
    font-size:48px; font-weight:700; letter-spacing:-0.02em; line-height:1;
    display:flex; align-items:baseline; gap:2px;
  }
  .hero-value .cents{ font-size:24px; color:var(--ink-faint); font-weight:500; }
  .hero-delta{
    margin-top:12px; display:flex; align-items:center; gap:8px; font-family:'JetBrains Mono', monospace; font-size:14px;
  }
  .pill{
    display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border-radius:100px;
    font-size:13px; font-weight:600;
  }
  .pill.up{ background:rgba(74,222,128,0.12); color:var(--up); }
  .pill.down{ background:rgba(255,107,94,0.12); color:var(--down); }
  .hero-sub{ color:var(--ink-faint); font-size:13px; }

  /* Allocation bar */
  .alloc-bar{
    margin:18px 20px 0; height:10px; border-radius:6px; overflow:hidden; display:flex;
    background:var(--line-soft); position:relative; z-index:1;
  }
  .alloc-seg{ height:100%; }

  .alloc-legend{
    display:flex; flex-wrap:wrap; gap:14px; padding:12px 20px 0; position:relative; z-index:1;
  }
  .legend-item{ display:flex; align-items:center; gap:6px; font-size:12px; color:var(--ink-dim); font-family:'JetBrains Mono', monospace; }
  .legend-dot{ width:8px; height:8px; border-radius:50%; flex-shrink:0; }

  /* Section headers */
  .section-head{
    padding:30px 20px 10px; display:flex; align-items:baseline; justify-content:space-between; position:relative; z-index:1;
  }
  .section-title{ font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:var(--ink-dim); }
  .section-link{ font-family:'JetBrains Mono', monospace; font-size:12px; color:var(--accent); background:none; border:none; cursor:pointer; padding:0; }

  /* Holdings list */
  .holdings{ padding:0 20px; display:flex; flex-direction:column; gap:10px; position:relative; z-index:1; }
  .coin-card{
    background:var(--bg-card); border:1px solid var(--line); border-radius:var(--radius);
    padding:16px; display:flex; align-items:center; gap:12px; cursor:pointer;
    transition: border-color .2s, transform .15s;
  }
  .coin-card:active{ transform: scale(0.98); }
  .coin-icon{
    width:42px; height:42px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-family:'JetBrains Mono', monospace; font-weight:700; font-size:14px;
    color:#07090c;
  }
  .coin-info{ flex:1; min-width:0; }
  .coin-name{ font-size:15px; font-weight:600; }
  .coin-sub{ font-family:'JetBrains Mono', monospace; font-size:12px; color:var(--ink-faint); margin-top:2px; }
  .coin-right{ text-align:right; flex-shrink:0; }
  .coin-value{ font-family:'JetBrains Mono', monospace; font-size:15px; font-weight:600; }
  .coin-change{ font-family:'JetBrains Mono', monospace; font-size:12px; margin-top:3px; }
  .coin-change.up{ color:var(--up); }
  .coin-change.down{ color:var(--down); }

  .empty-state{
    padding:40px 20px; text-align:center; color:var(--ink-faint); font-size:14px;
  }

  /* Add coin button */
  .add-btn{
    margin:14px 20px 0; padding:15px; border-radius:var(--radius); border:1px dashed var(--line);
    background:transparent; color:var(--ink-dim); font-family:'Space Grotesk', sans-serif; font-size:14px; font-weight:600;
    width:calc(100% - 40px); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;
    position:relative; z-index:1;
  }
  .add-btn:active{ border-color:var(--accent-dim); color:var(--accent); }

  /* Modal */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(4,5,7,0.7); backdrop-filter: blur(6px);
    z-index:50; display:flex; align-items:flex-end; justify-content:center;
    opacity:0; pointer-events:none; transition: opacity .25s;
  }
  .modal-overlay.open{ opacity:1; pointer-events:all; }
  .modal{
    background:var(--bg-elevated); border-radius:24px 24px 0 0; width:100%; max-width:560px;
    padding:8px 20px 28px; transform: translateY(100%); transition: transform .3s cubic-bezier(.2,.9,.3,1);
    border-top:1px solid var(--line); max-height:85vh; overflow-y:auto;
  }
  .modal-overlay.open .modal{ transform: translateY(0); }
  .modal-handle{ width:36px; height:4px; background:var(--line); border-radius:4px; margin:10px auto 18px; }
  .modal-title{ font-size:18px; font-weight:700; margin-bottom:4px; }
  .modal-sub{ font-size:13px; color:var(--ink-faint); margin-bottom:20px; }

  .search-input{
    width:100%; padding:14px 16px; border-radius:14px; border:1px solid var(--line);
    background:var(--bg-card); color:var(--ink); font-family:'Space Grotesk', sans-serif; font-size:15px;
    margin-bottom:14px; outline:none;
  }
  .search-input:focus{ border-color:var(--accent-dim); }

  .coin-pick-list{ display:flex; flex-direction:column; gap:6px; max-height:280px; overflow-y:auto; margin-bottom:6px; }
  .coin-pick{
    display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:12px; cursor:pointer;
    border:1px solid transparent;
  }
  .coin-pick:active{ background:var(--bg-card); }
  .coin-pick.selected{ background:rgba(217,255,75,0.08); border-color:var(--accent-dim); }
  .coin-pick-icon{
    width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-family:'JetBrains Mono', monospace; font-weight:700; font-size:11px; color:#07090c; flex-shrink:0;
  }
  .coin-pick-name{ flex:1; font-size:14px; }
  .coin-pick-sym{ font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--ink-faint); text-transform:uppercase; }

  .qty-row{ margin-top:10px; }
  .qty-label{ font-size:12px; color:var(--ink-faint); margin-bottom:8px; font-family:'JetBrains Mono', monospace; text-transform:uppercase; letter-spacing:0.08em; }
  .qty-input-wrap{ display:flex; align-items:center; gap:10px; background:var(--bg-card); border:1px solid var(--line); border-radius:14px; padding:4px 16px; }
  .qty-input-wrap input{
    flex:1; background:none; border:none; outline:none; color:var(--ink); font-family:'JetBrains Mono', monospace;
    font-size:20px; font-weight:600; padding:12px 0; min-width:0;
  }
  .qty-sym{ font-family:'JetBrains Mono', monospace; color:var(--ink-faint); font-size:14px; }

  .modal-actions{ display:flex; gap:10px; margin-top:20px; }
  .btn{
    flex:1; padding:15px; border-radius:14px; border:none; font-family:'Space Grotesk', sans-serif;
    font-size:15px; font-weight:600; cursor:pointer;
  }
  .btn-primary{ background:var(--accent); color:#07090c; }
  .btn-primary:disabled{ opacity:0.35; }
  .btn-ghost{ background:var(--bg-card); color:var(--ink-dim); border:1px solid var(--line); }
  .btn-danger{ background:rgba(255,107,94,0.1); color:var(--down); border:1px solid rgba(255,107,94,0.25); }

  .loading-row{ display:flex; align-items:center; justify-content:center; padding:30px; color:var(--ink-faint); font-size:13px; font-family:'JetBrains Mono', monospace; gap:10px; }
  .spinner{
    width:16px; height:16px; border-radius:50%; border:2px solid var(--line); border-top-color:var(--accent);
    animation: spin .8s linear infinite;
  }

  footer{
    padding:30px 20px 10px; text-align:center; position:relative; z-index:1;
  }
  footer p{ font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--ink-faint); margin:0; }

  ::-webkit-scrollbar{ width:0; height:0; }
</style>
</head>
<body>

<div id="root"></div>

<script>
const COIN_META = {
  bitcoin:    { symbol:'BTC', name:'Bitcoin',  color:'#F7931A' },
  ethereum:   { symbol:'ETH', name:'Ethereum', color:'#8C9EFF' },
  solana:     { symbol:'SOL', name:'Solana',   color:'#9945FF' },
  ripple:     { symbol:'XRP', name:'XRP',      color:'#6BC2D8' },
  cardano:    { symbol:'ADA', name:'Cardano',  color:'#5A8FD6' },
  dogecoin:   { symbol:'DOGE',name:'Dogecoin', color:'#C2A633' },
  polkadot:   { symbol:'DOT', name:'Polkadot', color:'#E6007A' },
  chainlink:  { symbol:'LINK',name:'Chainlink',color:'#2A5ADA' },
  litecoin:   { symbol:'LTC', name:'Litecoin', color:'#B8B8B8' },
  'avalanche-2':{ symbol:'AVAX',name:'Avalanche',color:'#E84142' },
  stellar:    { symbol:'XLM', name:'Stellar',  color:'#14B6E7' },
  tron:       { symbol:'TRX', name:'Tron',     color:'#EF0027' },
  'matic-network':{ symbol:'MATIC',name:'Polygon',color:'#8247E5' },
  uniswap:    { symbol:'UNI', name:'Uniswap',  color:'#FF4FD8' },
  'bitcoin-cash':{ symbol:'BCH', name:'Bitcoin Cash', color:'#8DC351' },
};

const STORAGE_KEY = 'holdings_portfolio_v1';
const PALETTE_FALLBACK = ['#d9ff4b','#8C9EFF','#FF8A65','#4ADE80','#E6007A','#14B6E7'];

function loadPortfolio(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return { bitcoin: 0.05, ethereum: 0.8, solana: 4, ripple: 250 };
}
function savePortfolio(p){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(p));
}

let state = {
  portfolio: loadPortfolio(),
  prices: {},
  loading: true,
  error: null,
  modalOpen: false,
  modalStep: 'pick', // pick | qty
  pickedCoin: null,
  qtyValue: '',
  search: '',
  lastUpdated: null,
};

function fmtEUR(n, opts={}){
  if(n === null || n === undefined || isNaN(n)) return '—';
  return new Intl.NumberFormat('nl-NL', { style:'currency', currency:'EUR', minimumFractionDigits: opts.min ?? 0, maximumFractionDigits: opts.max ?? 0 }).format(n);
}
function fmtNum(n, max=6){
  if(n === null || n === undefined || isNaN(n)) return '—';
  return new Intl.NumberFormat('nl-NL', { maximumFractionDigits:max }).format(n);
}

async function fetchJSON(url){
  const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
  if(!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

async function fetchPrices(){
  const ids = Object.keys(state.portfolio).join(',');
  if(!ids){ state.loading=false; render(); return; }
  state.loading = true; render();

  const directUrl = `https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=eur&include_24hr_change=true`;
  const proxyUrl = `https://corsproxy.io/?url=${encodeURIComponent(directUrl)}`;

  let lastErr = null;
  for(const url of [directUrl, proxyUrl]){
    try{
      const data = await fetchJSON(url);
      if(data && typeof data === 'object' && Object.keys(data).length){
        state.prices = data;
        state.error = null;
        state.lastUpdated = new Date();
        state.loading = false;
        render();
        return;
      }
    }catch(e){
      lastErr = e;
    }
  }
  state.error = 'Kon koersen niet ophalen — probeer het opnieuw';
  state.loading = false;
  render();
}

function totalValue(){
  let total = 0;
  for(const [id, qty] of Object.entries(state.portfolio)){
    const p = state.prices[id];
    if(p && p.eur) total += p.eur * qty;
  }
  return total;
}
function totalDelta24h(){
  // weighted average 24h change based on current value contribution
  let total = totalValue();
  if(total === 0) return 0;
  let prevTotal = 0;
  for(const [id, qty] of Object.entries(state.portfolio)){
    const p = state.prices[id];
    if(p && p.eur){
      const change = p.eur_24h_change || 0;
      const prevPrice = p.eur / (1 + change/100);
      prevTotal += prevPrice * qty;
    }
  }
  if(prevTotal === 0) return 0;
  return ((total - prevTotal) / prevTotal) * 100;
}

function coinColor(id){
  return (COIN_META[id] && COIN_META[id].color) || PALETTE_FALLBACK[Object.keys(state.portfolio).indexOf(id) % PALETTE_FALLBACK.length];
}
function coinSymbol(id){ return (COIN_META[id] && COIN_META[id].symbol) || id.slice(0,4).toUpperCase(); }
function coinName(id){ return (COIN_META[id] && COIN_META[id].name) || id; }

function openAddModal(){
  state.modalOpen = true; state.modalStep='pick'; state.pickedCoin=null; state.qtyValue=''; state.search='';
  render();
  setTimeout(()=>{ document.getElementById('coinSearchInput')?.focus(); }, 50);
}
function closeModal(){
  state.modalOpen = false; render();
}
function pickCoin(id){
  state.pickedCoin = id;
  state.qtyValue = state.portfolio[id] ? String(state.portfolio[id]) : '';
  state.modalStep = 'qty';
  render();
  setTimeout(()=>{ document.getElementById('qtyInput')?.focus(); }, 50);
}
function confirmQty(){
  const val = parseFloat(state.qtyValue.replace(',','.'));
  if(!isNaN(val) && val > 0 && state.pickedCoin){
    state.portfolio[state.pickedCoin] = val;
    savePortfolio(state.portfolio);
    closeModal();
    fetchPrices();
  }
}
function removeCoin(id){
  delete state.portfolio[id];
  savePortfolio(state.portfolio);
  closeModal();
  render();
}

function renderCoinIcon(id, size){
  const sym = coinSymbol(id);
  const color = coinColor(id);
  return `<div class="coin-icon" style="width:${size}px;height:${size}px;background:${color};font-size:${size*0.32}px;">${sym.slice(0,3)}</div>`;
}

function render(){
  const root = document.getElementById('root');
  const total = totalValue();
  const delta = totalDelta24h();
  const isUp = delta >= 0;
  const ids = Object.keys(state.portfolio);

  // sort holdings by value desc
  const sorted = ids.slice().sort((a,b)=>{
    const va = (state.prices[a]?.eur || 0) * state.portfolio[a];
    const vb = (state.prices[b]?.eur || 0) * state.portfolio[b];
    return vb - va;
  });

  let allocBar = '';
  let legend = '';
  if(total > 0){
    allocBar = sorted.map(id=>{
      const val = (state.prices[id]?.eur || 0) * state.portfolio[id];
      const pct = (val/total*100);
      if(pct <= 0) return '';
      return `<div class="alloc-seg" style="width:${pct}%;background:${coinColor(id)}"></div>`;
    }).join('');
    legend = sorted.map(id=>{
      const val = (state.prices[id]?.eur || 0) * state.portfolio[id];
      const pct = total>0 ? (val/total*100) : 0;
      if(pct <= 0) return '';
      return `<div class="legend-item"><span class="legend-dot" style="background:${coinColor(id)}"></span>${coinSymbol(id)} ${pct.toFixed(0)}%</div>`;
    }).join('');
  }

  let holdingsHTML = '';
  if(state.loading && ids.length){
    holdingsHTML = `<div class="loading-row"><div class="spinner"></div> Koersen ophalen…</div>`;
  } else if(ids.length === 0){
    holdingsHTML = `<div class="empty-state">Nog geen munten toegevoegd.<br>Tik hieronder om te beginnen.</div>`;
  } else {
    holdingsHTML = sorted.map(id=>{
      const p = state.prices[id];
      const price = p?.eur ?? null;
      const change = p?.eur_24h_change ?? null;
      const qty = state.portfolio[id];
      const value = price !== null ? price * qty : null;
      const changeClass = change === null ? '' : (change >= 0 ? 'up' : 'down');
      const changeStr = change === null ? '' : `${change >= 0 ? '+' : ''}${change.toFixed(2)}%`;
      return `
        <div class="coin-card" onclick="pickCoin('${id}')">
          ${renderCoinIcon(id, 42)}
          <div class="coin-info">
            <div class="coin-name">${coinName(id)}</div>
            <div class="coin-sub mono">${fmtNum(qty)} ${coinSymbol(id)} · ${price !== null ? fmtEUR(price, {max:2}) : '—'}</div>
          </div>
          <div class="coin-right">
            <div class="coin-value mono">${value !== null ? fmtEUR(value, {max:0}) : '—'}</div>
            <div class="coin-change mono ${changeClass}">${changeStr}</div>
          </div>
        </div>`;
    }).join('');
  }

  const lastUpdatedStr = state.lastUpdated ? state.lastUpdated.toLocaleTimeString('nl-NL', {hour:'2-digit', minute:'2-digit'}) : '—';

  root.innerHTML = `
    <div class="glow"></div>
    <header>
      <div>
        <p class="brand-eyebrow mono">Portfolio · live</p>
        <h1 class="brand-title">Holdings</h1>
      </div>
      <button class="refresh-btn ${state.loading ? 'spinning':''}" onclick="fetchPrices()" aria-label="Ververs">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <polyline points="1 20 1 14 7 14"></polyline>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
        </svg>
      </button>
    </header>

    <div class="hero">
      <div class="hero-label mono">Totale waarde</div>
      <div class="hero-value">${fmtEUR(total, {max:2}).split(',')[0]}<span class="cents mono">${total ? ',' + (total.toFixed(2).split('.')[1]) : ''}</span></div>
      <div class="hero-delta">
        ${ids.length ? `<span class="pill ${isUp?'up':'down'}">${isUp?'▲':'▼'} ${Math.abs(delta).toFixed(2)}%</span>` : ''}
        <span class="hero-sub mono">${state.error ? state.error : `bijgewerkt ${lastUpdatedStr}`}</span>
      </div>
    </div>

    ${total > 0 ? `<div class="alloc-bar">${allocBar}</div><div class="alloc-legend">${legend}</div>` : ''}

    <div class="section-head">
      <span class="section-title">Munten</span>
      <button class="section-link" onclick="fetchPrices()">Ververs</button>
    </div>
    <div class="holdings">${holdingsHTML}</div>

    <button class="add-btn" onclick="openAddModal()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      Munt toevoegen of bewerken
    </button>

    <footer><p>Koersdata via CoinGecko · geen beleggingsadvies</p></footer>

    ${renderModal()}
  `;
}

function renderModal(){
  if(!state.modalOpen) return '';

  if(state.modalStep === 'pick'){
    const filtered = Object.keys(COIN_META).filter(id=>{
      const q = state.search.toLowerCase();
      return !q || coinName(id).toLowerCase().includes(q) || coinSymbol(id).toLowerCase().includes(q);
    });
    const list = filtered.map(id=>{
      const has = state.portfolio.hasOwnProperty(id);
      return `
        <div class="coin-pick ${has?'selected':''}" onclick="pickCoin('${id}')">
          ${renderCoinIcon(id, 30)}
          <div class="coin-pick-name">${coinName(id)}</div>
          <div class="coin-pick-sym mono">${coinSymbol(id)}</div>
        </div>`;
    }).join('');
    return `
      <div class="modal-overlay open" onclick="if(event.target===this) closeModal()">
        <div class="modal">
          <div class="modal-handle"></div>
          <div class="modal-title">Munt kiezen</div>
          <div class="modal-sub">Zoek en selecteer een cryptomunt</div>
          <input id="coinSearchInput" class="search-input" placeholder="Zoek munt…" value="${state.search}" oninput="state.search=this.value; render(); document.getElementById('coinSearchInput').focus(); document.getElementById('coinSearchInput').setSelectionRange(${state.search.length},${state.search.length});">
          <div class="coin-pick-list">${list || '<div class="empty-state">Geen resultaten</div>'}</div>
          <div class="modal-actions">
            <button class="btn btn-ghost" onclick="closeModal()">Annuleren</button>
          </div>
        </div>
      </div>`;
  }

  if(state.modalStep === 'qty'){
    const id = state.pickedCoin;
    const exists = state.portfolio.hasOwnProperty(id);
    return `
      <div class="modal-overlay open" onclick="if(event.target===this) closeModal()">
        <div class="modal">
          <div class="modal-handle"></div>
          <div class="modal-title">${coinName(id)}</div>
          <div class="modal-sub">Hoeveel ${coinSymbol(id)} bezit je?</div>
          <div class="qty-row">
            <div class="qty-input-wrap">
              <input id="qtyInput" type="text" inputmode="decimal" placeholder="0.00" value="${state.qtyValue}"
                oninput="state.qtyValue=this.value" />
              <span class="qty-sym mono">${coinSymbol(id)}</span>
            </div>
          </div>
          <div class="modal-actions">
            ${exists ? `<button class="btn btn-danger" onclick="removeCoin('${id}')">Verwijderen</button>` : `<button class="btn btn-ghost" onclick="state.modalStep='pick'; render(); setTimeout(()=>document.getElementById('coinSearchInput')?.focus(),50);">Terug</button>`}
            <button class="btn btn-primary" onclick="confirmQty()">Opslaan</button>
          </div>
        </div>
      </div>`;
  }
  return '';
}

// initial render + fetch
render();
fetchPrices();
// auto-refresh every 60s
setInterval(fetchPrices, 60000);
</script>
</body>
</html>
